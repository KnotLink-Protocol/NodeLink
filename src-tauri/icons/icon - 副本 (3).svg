<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="card">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- 画布背景 -->
  <rect width="512" height="512" fill="#F8F9FA"/>

  <!-- 密网格（对应 10px gap） -->
  <pattern id="grid-small" width="24" height="24" patternUnits="userSpaceOnUse">
    <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#E5E7EB" stroke-width="0.5"/>
  </pattern>
  <rect width="512" height="512" fill="url(#grid-small)"/>

  <!-- 粗网格（对应 100px gap） -->
  <pattern id="grid-large" width="120" height="120" patternUnits="userSpaceOnUse">
    <path d="M 120 0 L 0 0 0 120" fill="none" stroke="#D1D5DB" stroke-width="1"/>
  </pattern>
  <rect width="512" height="512" fill="url(#grid-large)"/>

  <!-- MiniMap -->
  <rect x="392" y="392" width="96" height="96" rx="8" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.5" filter="url(#card)"/>
  <rect x="402" y="410" width="30" height="20" rx="3" fill="#14B8A6" opacity="0.7"/>
  <rect x="438" y="425" width="25" height="18" rx="3" fill="#8B5CF6" opacity="0.7"/>
  <rect x="410" y="440" width="20" height="15" rx="2" fill="#F59E0B" opacity="0.5"/>

  <!-- ═══ 贝塞尔连线 ═══ -->
  <path d="M 270 320 C 310 320, 350 340, 380 340"
        fill="none" stroke="#9CA3AF" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 小动画圆点 -->
  <circle cx="325" cy="330" r="3" fill="#6B7280"/>

  <!-- ═══ Knot 节点 ═══ -->
  <g filter="url(#card)">
    <rect x="60" y="180" width="200" height="190" rx="14" fill="#FFFFFF"/>
    <path d="M60 194 Q60 180 74 180 L246 180 Q260 180 260 194 L260 230 L60 230 Z" fill="#14B8A6"/>
  </g>

  <!-- Knot 输入 -->
  <circle cx="44" cy="265" r="8" fill="#22C55E" stroke="#FFFFFF" stroke-width="2.5"/>
  <circle cx="44" cy="310" r="8" fill="#F59E0B" stroke="#FFFFFF" stroke-width="2.5"/>

  <!-- Knot 输出 -->
  <circle cx="276" cy="265" r="8" fill="#A855F7" stroke="#FFFFFF" stroke-width="2.5"/>
  <circle cx="276" cy="350" r="8" fill="#EF4444" stroke="#FFFFFF" stroke-width="2.5"/>

  <!-- Knot 标题 -->
  <text x="160" y="215" font-family="system-ui,sans-serif" font-size="26" font-weight="700" fill="#FFFFFF" text-anchor="middle">Knot</text>

  <!-- Knot 内部行 -->
  <rect x="80" y="250" width="100" height="10" rx="3" fill="#F3F4F6"/>
  <rect x="80" y="275" width="140" height="10" rx="3" fill="#F3F4F6"/>
  <rect x="80" y="300" width="110" height="10" rx="3" fill="#F3F4F6"/>
  <rect x="80" y="335" width="130" height="10" rx="3" fill="#F3F4F6"/>

  <!-- ═══ Link 节点 ═══ -->
  <g filter="url(#card)">
    <rect x="320" y="240" width="150" height="130" rx="12" fill="#FFFFFF"/>
    <path d="M320 252 Q320 240 332 240 L458 240 Q470 240 470 252 L470 278 L320 278 Z" fill="#8B5CF6"/>
  </g>

  <!-- Link 输入 -->
  <circle cx="308" cy="315" r="7" fill="#06B6D4" stroke="#FFFFFF" stroke-width="2"/>

  <!-- Link 输出 -->
  <circle cx="482" cy="305" r="7" fill="#3B82F6" stroke="#FFFFFF" stroke-width="2"/>

  <!-- Link 标题 -->
  <text x="395" y="268" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#FFFFFF" text-anchor="middle">Link</text>

  <!-- Link 内部行 -->
  <rect x="340" y="295" width="90" height="8" rx="2" fill="#F3F4F6"/>
  <rect x="340" y="315" width="70" height="8" rx="2" fill="#F3F4F6"/>

  <!-- Controls 按钮 -->
  <g filter="url(#card)">
    <rect x="40" y="410" width="64" height="64" rx="8" fill="#FFFFFF"/>
    <text x="72" y="436" font-family="system-ui,sans-serif" font-size="20" fill="#6B7280" text-anchor="middle">+</text>
    <line x1="48" y1="452" x2="96" y2="452" stroke="#E5E7EB" stroke-width="1"/>
    <text x="72" y="466" font-family="system-ui,sans-serif" font-size="18" fill="#6B7280" text-anchor="middle">−</text>
  </g>
</svg>
