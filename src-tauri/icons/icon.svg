<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="card">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <clipPath id="rounded">
      <rect width="512" height="512" rx="36"/>
    </clipPath>
  </defs>

  <g clip-path="url(#rounded)">
    <rect width="512" height="512" fill="#F8F9FA"/>

    <!-- 顶部标题栏 -->
    <rect x="0" y="0" width="512" height="56" fill="#1E293B"/>
  <text x="256" y="37" font-family="system-ui,-apple-system,sans-serif" font-size="24" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="6">NodeLink</text>

  <!-- 网格 -->
  <pattern id="g1" width="32" height="32" patternUnits="userSpaceOnUse" y="56">
    <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#E5E7EB" stroke-width="0.6"/>
  </pattern>
  <rect width="512" height="456" y="56" fill="url(#g1)"/>
  <pattern id="g2" width="160" height="160" patternUnits="userSpaceOnUse" y="56">
    <path d="M 160 0 L 0 0 0 160" fill="none" stroke="#D1D5DB" stroke-width="1"/>
  </pattern>
  <rect width="512" height="456" y="56" fill="url(#g2)"/>

  <!-- MiniMap -->
  <rect x="380" y="384" width="108" height="108" rx="10" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.5" filter="url(#card)"/>
  <rect x="394" y="404" width="34" height="22" rx="3" fill="#14B8A6" opacity="0.7"/>
  <rect x="436" y="422" width="26" height="18" rx="3" fill="#8B5CF6" opacity="0.7"/>
  <rect x="398" y="435" width="22" height="16" rx="2" fill="#F59E0B" opacity="0.5"/>

  <!-- Controls -->
  <g filter="url(#card)">
    <rect x="44" y="400" width="64" height="64" rx="8" fill="#FFFFFF"/>
    <text x="76" y="426" font-family="system-ui,sans-serif" font-size="22" fill="#6B7280" text-anchor="middle">+</text>
    <line x1="52" y1="440" x2="100" y2="440" stroke="#E5E7EB" stroke-width="1"/>
    <text x="76" y="457" font-family="system-ui,sans-serif" font-size="18" fill="#6B7280" text-anchor="middle">−</text>
  </g>

  <!-- 贝塞尔连线 -->
  <path d="M 298 200 C 310 200, 280 260, 296 260"
        fill="none" stroke="#9CA3AF" stroke-width="3" stroke-linecap="round"/>
  <circle cx="295" cy="230" r="4" fill="#6B7280"/>

  <!-- ═══ Knot ═══ -->
  <g filter="url(#card)">
    <rect x="56" y="92" width="220" height="240" rx="18" fill="#FFFFFF"/>
    <path d="M56 110 Q56 92 76 92 L256 92 Q276 92 276 110 L276 156 L56 156 Z" fill="#14B8A6"/>
  </g>
  <circle cx="34" cy="200" r="10" fill="#22C55E" stroke="#FFFFFF" stroke-width="3"/>
  <circle cx="34" cy="260" r="10" fill="#F59E0B" stroke="#FFFFFF" stroke-width="3"/>
  <circle cx="298" cy="200" r="10" fill="#A855F7" stroke="#FFFFFF" stroke-width="3"/>
  <circle cx="298" cy="310" r="10" fill="#EF4444" stroke="#FFFFFF" stroke-width="3"/>
  <text x="166" y="135" font-family="system-ui,sans-serif" font-size="28" font-weight="700" fill="#FFFFFF" text-anchor="middle">Knot</text>
  <rect x="86" y="178" width="120" height="12" rx="4" fill="#F3F4F6"/>
  <rect x="86" y="210" width="170" height="12" rx="4" fill="#F3F4F6"/>
  <rect x="86" y="242" width="140" height="12" rx="4" fill="#F3F4F6"/>
  <rect x="86" y="290" width="160" height="12" rx="4" fill="#F3F4F6"/>

  <!-- ═══ Link ═══ -->
  <g filter="url(#card)">
    <rect x="310" y="160" width="140" height="160" rx="14" fill="#FFFFFF"/>
    <path d="M310 174 Q310 160 324 160 L436 160 Q450 160 450 174 L450 206 L310 206 Z" fill="#8B5CF6"/>
  </g>
  <circle cx="296" cy="260" r="8" fill="#06B6D4" stroke="#FFFFFF" stroke-width="2.5"/>
  <circle cx="464" cy="240" r="8" fill="#3B82F6" stroke="#FFFFFF" stroke-width="2.5"/>
  <text x="380" y="192" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#FFFFFF" text-anchor="middle">Link</text>
  <rect x="340" y="226" width="90" height="10" rx="3" fill="#F3F4F6"/>
  <rect x="340" y="252" width="70" height="10" rx="3" fill="#F3F4F6"/>
  <rect x="340" y="278" width="100" height="10" rx="3" fill="#F3F4F6"/>
  </g>
</svg>
