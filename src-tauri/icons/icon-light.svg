<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-opacity="0.12"/></filter>
  </defs>

  <!-- 浅色背景 -->
  <rect x="56" y="56" width="400" height="400" rx="72" fill="#F8FAFC"/>

  <!-- 网格 -->
  <g stroke="#E2E8F0" stroke-width="0.8">
    <line x1="56" y1="200" x2="456" y2="200"/>
    <line x1="56" y1="344" x2="456" y2="344"/>
    <line x1="200" y1="56" x2="200" y2="456"/>
    <line x1="344" y1="56" x2="344" y2="456"/>
  </g>

  <!-- MiniMap -->
  <rect x="370" y="370" width="70" height="70" rx="8" fill="#E2E8F0" stroke="#CBD5E1" stroke-width="1.5"/>

  <!-- 节点 A -->
  <rect x="110" y="130" width="190" height="150" rx="22" fill="#FFFFFF" filter="url(#shadow)"/>

  <!-- 标题栏 A -->
  <path d="M110 152 Q110 130 132 130 L278 130 Q300 130 300 152 L300 175 L110 175 Z" fill="#3B82F6"/>

  <!-- 左侧 Handle A -->
  <circle cx="96" cy="220" r="12" fill="#22C55E" stroke="#FFFFFF" stroke-width="2.5"/>
  <circle cx="96" cy="255" r="12" fill="#F59E0B" stroke="#FFFFFF" stroke-width="2.5"/>

  <!-- 右侧 Handle A -->
  <circle cx="314" cy="200" r="12" fill="#A855F7" stroke="#FFFFFF" stroke-width="2.5"/>

  <!-- 连线 -->
  <path d="M 108 220 C 180 220, 280 210, 302 210"
        fill="none" stroke="#94A3B8" stroke-width="3" stroke-linecap="round"/>

  <!-- 节点 B -->
  <rect x="250" y="200" width="140" height="120" rx="18" fill="#FFFFFF" filter="url(#shadow)"/>

  <!-- 标题栏 B -->
  <path d="M250 218 Q250 200 268 200 L372 200 Q390 200 390 218 L390 238 L250 238 Z" fill="#8B5CF6"/>

  <!-- 左侧 Handle B -->
  <circle cx="236" cy="270" r="10" fill="#06B6D4" stroke="#FFFFFF" stroke-width="2"/>
  <!-- 右侧 Handle B -->
  <circle cx="378" cy="260" r="10" fill="#EF4444" stroke="#FFFFFF" stroke-width="2"/>

  <!-- 标题文字 -->
  <text x="205" y="161" font-family="system-ui,sans-serif" font-size="28" font-weight="700" fill="#FFFFFF" text-anchor="middle">Node</text>
  <text x="320" y="226" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">Link</text>
</svg>
