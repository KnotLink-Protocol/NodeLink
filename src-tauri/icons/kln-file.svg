<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F3F4F6"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- 文档主体 -->
  <rect x="56" y="36" width="320" height="440" rx="28" fill="url(#card)" filter="url(#shadow)"/>
  <rect x="56" y="36" width="320" height="440" rx="28" fill="none" stroke="#D1D5DB" stroke-width="2"/>

  <!-- 标题栏 -->
  <path d="M56 64 Q56 36 84 36 L376 36 L376 96 L56 96 Z" fill="#14B8A6"/>

  <!-- 折角（标题栏上方） -->
  <path d="M 316 36 L 316 76 Q 316 96 336 96 L 376 96 L 376 96 L 316 36 Z" fill="#0D9488" stroke="#D1D5DB" stroke-width="1.5"/>

  <!-- NodeLink 文字 -->
  <text x="216" y="76" font-family="system-ui,sans-serif" font-size="28" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="4">.kln</text>

  <!-- Handle -->
  <circle cx="42" cy="200" r="8" fill="#22C55E" stroke="#FFFFFF" stroke-width="2.5"/>
  <circle cx="42" cy="250" r="8" fill="#F59E0B" stroke="#FFFFFF" stroke-width="2.5"/>
  <circle cx="390" cy="200" r="8" fill="#A855F7" stroke="#FFFFFF" stroke-width="2.5"/>

  <!-- 内容行 -->
  <rect x="90" y="140" width="180" height="12" rx="4" fill="#F3F4F6"/>
  <rect x="90" y="170" width="240" height="12" rx="4" fill="#F3F4F6"/>
  <rect x="90" y="200" width="160" height="12" rx="4" fill="#F3F4F6"/>
  <rect x="90" y="230" width="200" height="12" rx="4" fill="#F3F4F6"/>

  <!-- 底部节点装饰 -->
  <rect x="130" y="310" width="170" height="110" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <path d="M130 324 Q130 310 144 310 L286 310 Q300 310 300 324 L300 345 L130 345 Z" fill="#8B5CF6"/>
  <text x="215" y="335" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">project</text>
  <rect x="150" y="360" width="100" height="8" rx="3" fill="#F3F4F6"/>
  <rect x="150" y="380" width="130" height="8" rx="3" fill="#F3F4F6"/>
  <rect x="150" y="400" width="80" height="8" rx="3" fill="#F3F4F6"/>
</svg>
