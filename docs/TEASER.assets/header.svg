<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="8" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- 网格 -->
  <g stroke="#1A2A4A" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="213" x2="1280" y2="213"/>
    <line x1="0" y1="426" x2="1280" y2="426"/>
    <line x1="426" y1="0" x2="426" y2="640"/>
    <line x1="853" y1="0" x2="853" y2="640"/>
  </g>

  <!-- 文字区 -->
  <g transform="translate(100, 160)">
    <rect x="0" y="0" width="100" height="8" rx="4" fill="url(#accent)"/>
    <text x="0" y="70" font-family="system-ui,sans-serif" font-size="80" font-weight="900" fill="#FFFFFF" letter-spacing="6">NodeLink</text>
    <text x="0" y="130" font-family="system-ui,sans-serif" font-size="32" font-weight="400" fill="#94A3B8" letter-spacing="10">可视化自动化编辑器</text>
    <text x="0" y="185" font-family="system-ui,sans-serif" font-size="20" fill="#64748B">拖拽连线 · 生成 Python 代码 · 桌面原生</text>
  </g>

  <!-- 右侧节点 -->
  <g transform="translate(740, 120) scale(1.3)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="220" height="190" rx="16" fill="#2D2D3F"/>
      <path d="M0 16 Q0 0 16 0 L204 0 Q220 0 220 16 L220 50 L0 50 Z" fill="#14B8A6"/>
      <text x="110" y="34" font-family="system-ui,sans-serif" font-size="24" font-weight="700" fill="#FFFFFF" text-anchor="middle">search</text>
    </g>
    <circle cx="-20" cy="100" r="10" fill="#22C55E" filter="url(#glow)"/>
    <circle cx="-20" cy="155" r="10" fill="#F59E0B" filter="url(#glow)"/>
    <circle cx="242" cy="100" r="10" fill="#A855F7" filter="url(#glow)"/>

    <path d="M -10 100 C 80 100, 150 120, 200 120"
          fill="none" stroke="#6B7280" stroke-width="3.5" stroke-linecap="round"/>
    <circle cx="100" cy="112" r="5" fill="#22C55E" opacity="0.9"/>

    <g filter="url(#shadow)">
      <rect x="200" y="85" width="190" height="150" rx="14" fill="#2D2D3F"/>
      <path d="M200 99 Q200 85 214 85 L376 85 Q390 85 390 99 L390 132 L200 132 Z" fill="#8B5CF6"/>
      <text x="295" y="118" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#FFFFFF" text-anchor="middle">EdgeTTS</text>
    </g>
    <circle cx="184" cy="170" r="9" fill="#06B6D4"/>
    <circle cx="404" cy="160" r="9" fill="#EF4444"/>

    <path d="M -10 155 C 80 155, 130 190, 184 170"
          fill="none" stroke="#6B7280" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- 底部 -->
  <rect x="100" y="560" width="1080" height="1" fill="#1E3264" opacity="0.5"/>
  <text x="640" y="605" font-family="system-ui,sans-serif" font-size="15" fill="#475569" text-anchor="middle">即将在 GitHub 开源发布 · GPLv3 · github.com/KnotLink-Protocol/NodeLink</text>
</svg>
