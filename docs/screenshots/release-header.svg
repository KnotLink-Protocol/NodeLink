<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="top" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-opacity="0.3"/></filter>
  </defs>

  <!-- 上半：标题区 -->
  <rect width="1280" height="200" fill="url(#top)"/>

  <!-- 装饰节点 -->
  <g transform="translate(920,60) scale(1.1)" filter="url(#shadow)">
    <rect x="0" y="0" width="180" height="110" rx="14" fill="#2D2D3F"/>
    <path d="M0 14 Q0 0 14 0 L166 0 Q180 0 180 14 L180 36 L0 36 Z" fill="#14B8A6"/>
    <circle cx="-16" cy="65" r="7" fill="#22C55E" stroke="#1E293B" stroke-width="2"/>
    <circle cx="196" cy="55" r="7" fill="#A855F7" stroke="#1E293B" stroke-width="2"/>
    <circle cx="196" cy="85" r="7" fill="#F59E0B" stroke="#1E293B" stroke-width="2"/>
  </g>

  <g transform="translate(1040,100) scale(1.1)" filter="url(#shadow)">
    <rect x="0" y="0" width="150" height="90" rx="12" fill="#2D2D3F"/>
    <path d="M0 12 Q0 0 12 0 L138 0 Q150 0 150 12 L150 30 L0 30 Z" fill="#8B5CF6"/>
    <circle cx="-14" cy="55" r="6" fill="#06B6D4" stroke="#1E293B" stroke-width="2"/>
    <circle cx="164" cy="55" r="6" fill="#EF4444" stroke="#1E293B" stroke-width="2"/>
  </g>

  <rect y="0" x="60" width="6" height="80" rx="3" fill="#3B82F6"/>
  <rect y="90" x="60" width="6" height="50" rx="3" fill="#8B5CF6"/>

  <text x="90" y="75" font-family="system-ui,sans-serif" font-size="48" font-weight="900" fill="#FFFFFF" letter-spacing="4">NodeLink</text>
  <text x="90" y="125" font-family="system-ui,sans-serif" font-size="22" font-weight="400" fill="#94A3B8" letter-spacing="6">可视化自动化编辑器</text>
  <text x="90" y="160" font-family="system-ui,sans-serif" font-size="14" fill="#64748B">拖拽连线 · 生成 Python 代码 · 桌面原生 · 开源免费</text>

  <rect y="190" x="90" width="120" height="4" rx="2" fill="url(#accent)"/>

  <!-- 下半：截图区 -->
  <rect y="200" width="1280" height="520" fill="#F3F4F6"/>

  <!-- 截图占位 -->
  <rect x="60" y="230" width="1160" height="460" rx="10" fill="#E5E7EB" stroke="#D1D5DB" stroke-width="1"/>
  <text x="640" y="470" font-family="system-ui,sans-serif" font-size="20" fill="#9CA3AF" text-anchor="middle">📸 软件主界面截图</text>
</svg>
